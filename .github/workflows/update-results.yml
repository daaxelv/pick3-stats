name: Update NJ lottery results

on:
  schedule:
    # ~1:19 PM and ~11:17 PM Eastern, ~20 minutes after midday and evening drawings
    - cron: "19 17 * * *"
    - cron: "17 3 * * *"
  workflow_dispatch: {}   # lets you also run it manually with one click
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest draws
        run: python scripts/update_results.py

      - name: Commit new results
        run: |
          git config user.name "results-bot"
          git config user.email "actions@github.com"
          git add data/nj_numbers_canonical.csv
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Auto-update lottery results $(date -u +%F)"
            git push
          fi
